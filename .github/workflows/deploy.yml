name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 只有在推送至 main 分支时触发

permissions:
  contents: write # 必须赋予写入权限以推送至 gh-pages 分支

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vue 打包后的文件夹名称
          branch: gh-pages # 部署到的目标分支